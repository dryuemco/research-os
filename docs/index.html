<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPOS Operator Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>RPOS Operator Dashboard</h1>
        <p class="muted">Static GitHub Pages frontend consuming live Render APIs.</p>
      </div>
      <div class="topbar-actions">
        <button id="refresh-current" type="button">Refresh Current View</button>
        <a id="ui-link" href="#" target="_blank" rel="noreferrer">Open Internal UI</a>
        <a id="docs-link" href="#" target="_blank" rel="noreferrer">Open API Docs</a>
        <a id="health-link" href="#" target="_blank" rel="noreferrer">Check Health</a>
      </div>
    </header>

    <div id="connection-banner" class="banner hidden"></div>

    <div class="shell">
      <aside class="sidebar">
        <nav>
          <a class="nav-link active" href="#overview" data-page="overview">Overview</a>
          <a class="nav-link" href="#health" data-page="health">System Health</a>
          <a class="nav-link" href="#opportunities" data-page="opportunities">Opportunities</a>
          <a class="nav-link" href="#matches" data-page="matches">Matches</a>
          <a class="nav-link" href="#notifications" data-page="notifications">Notifications</a>
          <a class="nav-link" href="#operations" data-page="operations">Operational Runs</a>
          <a class="nav-link" href="#proposals" data-page="proposals">Proposal Workspaces</a>
          <a class="nav-link" href="#exports" data-page="exports">Export Packages</a>
          <a class="nav-link" href="#intelligence" data-page="intelligence">Intelligence</a>
        </nav>
      </aside>

      <main>
        <section class="page active" id="page-overview"></section>
        <section class="page" id="page-health"></section>
        <section class="page" id="page-opportunities"></section>
        <section class="page" id="page-matches"></section>
        <section class="page" id="page-notifications"></section>
        <section class="page" id="page-operations"></section>
        <section class="page" id="page-proposals"></section>
        <section class="page" id="page-exports"></section>
        <section class="page" id="page-intelligence"></section>
      </main>
    </div>

    <script src="./site-config.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
