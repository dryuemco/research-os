version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: research_os
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d research_os"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - artifacts_data:/workspace/artifacts
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy


  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    command: python -m app.scripts.run_execution_worker
    volumes:
      - .:/workspace
      - artifacts_data:/workspace/artifacts
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy

  ops_worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    command: python -m app.scripts.run_operational_loop
    volumes:
      - .:/workspace
      - artifacts_data:/workspace/artifacts
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  artifacts_data:
